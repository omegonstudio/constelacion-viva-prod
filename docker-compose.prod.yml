services:
  postgres:
    image: postgres:15-alpine
    container_name: cv_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - constelacion_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv_backend
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: always
    networks:
      - constelacion_network

  frontend:
    build:
      context: ./Constelacion-viva
      dockerfile: Dockerfile
    container_name: cv_frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    networks:
      - constelacion_network

volumes:
  postgres_data:

networks:
  constelacion_network:
    driver: bridge