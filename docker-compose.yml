services:
  localstack:
    image: localstack/localstack:2.3
    container_name: cv_localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      EDGE_PORT: "4566"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - constelacion_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: cv_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - constelacion_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cv_backend
    # IMPORTANT:
    # - Compose interpolation (${VAR}) uses the project `.env` (root) + shell env,
    #   NOT service `env_file`.
    # - Our Mercado Pago secrets live in `backend/.env` in this repo, so we must
    #   load that file into the container directly (and avoid ${MP_*} interpolation).
    env_file:
      - .env
      - ./backend/.env
    environment:
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      # 🔥 MERCADO PAGO (MEMBRESÍAS)
      # Provided via env_file (see above). Do NOT interpolate here.
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/entrypoint.sh:/entrypoint.sh
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
      - ./backend/requirements-dev.txt:/app/requirements-dev.txt
    ports:
      - "8000:8000"
    entrypoint: ["/entrypoint.sh"]
    networks:
      - constelacion_network
    restart: unless-stopped

  frontend:
    build:
      context: ./Constelacion-viva
      dockerfile: Dockerfile.dev
    container_name: cv_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./Constelacion-viva:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - constelacion_network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: cv_adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - constelacion_network
    restart: unless-stopped

networks:
  constelacion_network:
    driver: bridge

volumes:
  postgres_data:
  localstack_data:
