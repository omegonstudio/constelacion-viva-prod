name: Deploy CONSTELACIÓN VIVA (PROD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_commit:
        description: "Commit hash opcional para rollback"
        required: false
        default: ""

concurrency:
  group: constelacion-viva-prod
  cancel-in-progress: true

jobs:
  # ============================
  # 1️⃣ BUILD (FRONT + BACK)
  # ============================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------- Frontend ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: Constelacion-viva/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        working-directory: Constelacion-viva
        run: pnpm install --frozen-lockfile

      - name: Build Next.js frontend
        working-directory: Constelacion-viva
        run: pnpm build

      # ---------- Backend ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          TESTING: "1"
        run: pytest || true   # opcional si querés que falle

  # ============================
  # 2️⃣ DEPLOY (SOLO SI BUILD OK)
  # ============================
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Preparar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy en Droplet
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
          ${{ secrets.SSH_USER }}@${{ secrets.DROPLET_IP }} "bash -s" <<'REMOTE'
            set -euo pipefail

            echo "=== DEPLOY CONSTELACIÓN VIVA PROD ==="

            DIR="/opt/apps/constelacionviva"
            BRANCH="main"
            COMPOSE="docker-compose.prod.yml"

            cd "$DIR"

            # -------------------------
            # ROLLBACK MANUAL
            # -------------------------
            if [ -n "${{ github.event.inputs.rollback_commit }}" ]; then
              echo "-> ROLLBACK a ${{ github.event.inputs.rollback_commit }}"
              git fetch origin
              git reset --hard "${{ github.event.inputs.rollback_commit }}"
            else
              echo "-> Guardando commit previo"
              git rev-parse --short HEAD > .last_deploy_commit || true

              echo "-> Fetch + reset"
              git fetch origin
              git reset --hard "origin/$BRANCH"
            fi

            echo "-> Build + restart"
            docker compose -f "$COMPOSE" up -d --build --remove-orphans

            echo "-> Estado contenedores"
            docker compose -f "$COMPOSE" ps

            echo "-> Health backend"
            docker exec cv_backend curl -s http://localhost:8000/health || true

            echo "=== DEPLOY COMPLETADO ==="
          REMOTE