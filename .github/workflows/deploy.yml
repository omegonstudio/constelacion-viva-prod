name: Deploy CONSTELACIÓN VIVA (PROD)

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      rollback_commit:
        description: "Commit hash para rollback (opcional)"
        required: false
        default: ""

concurrency:
  group: constelacion-viva-prod
  cancel-in-progress: true


jobs:

# =================================
# BUILD
# =================================

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4


# --------------------------
# FRONTEND
# --------------------------

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend deps
        working-directory: Constelacion-viva
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: Constelacion-viva
        run: pnpm build


# --------------------------
# BACKEND
# --------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          TESTING: "1"
        run: |
          pytest || true



# =================================
# DEPLOY
# =================================

  deploy-prod:

    runs-on: ubuntu-latest
    needs: build

    steps:

# --------------------------
# PREPARAR SSH
# --------------------------

      - name: Preparar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519


# --------------------------
# HOST KEY
# --------------------------

      - name: Add droplet to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts


# --------------------------
# TEST SSH
# --------------------------

      - name: Test SSH connection
        run: |
          ssh \
          -i ~/.ssh/id_ed25519 \
          -o UserKnownHostsFile=~/.ssh/known_hosts \
          deploy@${{ secrets.DROPLET_IP }} "echo SSH OK"


# --------------------------
# DEPLOY
# --------------------------

      - name: Deploy en Droplet
        run: |

          ssh \
          -i ~/.ssh/id_ed25519 \
          -o UserKnownHostsFile=~/.ssh/known_hosts \
          deploy@${{ secrets.DROPLET_IP }} << 'EOF'

          echo "=============================="
          echo "🚀 DEPLOY CONSTELACIÓN VIVA"
          echo "=============================="

          DIR="/opt/apps/constelacion-viva-prod"
          BRANCH="main"

          cd "$DIR"

          echo "→ Actualizando repo"

          if [ -n "${{ github.event.inputs.rollback_commit }}" ]; then
            echo "⚠️ ROLLBACK a ${{ github.event.inputs.rollback_commit }}"
            git fetch origin
            git reset --hard "${{ github.event.inputs.rollback_commit }}"
          else
            git fetch origin
            git reset --hard origin/$BRANCH
          fi

          echo "→ Rebuild containers"

          docker compose up -d --build --remove-orphans


          echo ""
          echo "→ Estado contenedores"
          docker compose ps


          echo ""
          echo "→ Health check backend"

          docker exec cv_backend curl -s http://localhost:8000/api/health || true


          echo ""
          echo "✅ DEPLOY COMPLETADO"

          EOF