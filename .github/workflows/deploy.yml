name: Deploy Constelación Viva (PROD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_commit:
        description: "Commit hash opcional para rollback"
        required: false
        default: ""

concurrency:
  group: constelacion-viva-prod
  cancel-in-progress: true

jobs:
  # ============================
  # 1️⃣ CHECKS (GUARD RAIL)
  # ============================
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------- Frontend ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend – install deps
        working-directory: frontend
        run: |
          npm install -g pnpm
          pnpm install

      - name: Frontend – prettier check
        working-directory: frontend
        run: pnpm format:check

      - name: Frontend – build
        working-directory: frontend
        run: pnpm build

      # ---------- Backend ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend – install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend – run tests
        working-directory: backend
        env:
          TESTING: "1"
        run: pytest

  # ============================
  # 2️⃣ DEPLOY (SOLO SI CHECK OK)
  # ============================
  deploy-prod:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Preparar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy en Droplet
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
          ${{ secrets.SSH_USER }}@${{ secrets.DROPLET_IP }} "bash -s" <<'REMOTE'
            set -euo pipefail

            echo "=== DEPLOY CONSTELACIÓN VIVA PROD ==="

            REPO="https://github.com/omegonstudio/constelacion-viva.git"
            DIR="/opt/apps/constelacion-viva"
            BRANCH="main"
            COMPOSE="docker-compose.prod.yml"

            mkdir -p "$DIR"
            cd "$DIR"

            if [ ! -d ".git" ]; then
              echo "-> Clonando repositorio"
              git clone "$REPO" .
            fi

            echo "-> Guardando commit previo"
            git rev-parse --short HEAD > .last_deploy_commit || true

            echo "-> Fetch + reset"
            git fetch origin
            git reset --hard "origin/$BRANCH"

            echo "-> Bajando stack previo"
            docker compose -f "$COMPOSE" down --remove-orphans || true

            echo "-> Build sin cache"
            docker compose -f "$COMPOSE" build --no-cache

            echo "-> Levantando stack"
            docker compose -f "$COMPOSE" up -d --remove-orphans

            echo "-> Estado de contenedores"
            docker compose -f "$COMPOSE" ps

            echo "-> Logs backend (últimas 120 líneas)"
            docker logs constelacion-backend --tail=120 || true

            echo "-> Logs frontend (últimas 120 líneas)"
            docker logs constelacion-frontend --tail=120 || true

            echo "=== DEPLOY COMPLETADO ==="
          REMOTE
