name: Deploy CONSTELACIÓN VIVA (PROD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_commit:
        description: "Commit hash opcional para rollback"
        required: false
        default: ""

concurrency:
  group: constelacion-viva-prod
  cancel-in-progress: true

jobs:

# =====================================
# 1️⃣ BUILD (FRONT + BACK)
# =====================================

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------- FRONTEND ----------

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend deps
        working-directory: Constelacion-viva
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: Constelacion-viva
        run: pnpm build

      # ---------- BACKEND ----------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          TESTING: "1"
        run: pytest || true


# =====================================
# 2️⃣ DEPLOY
# =====================================

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build

    steps:

      # ---------- SSH KEY ----------

      - name: Preparar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # ---------- HOST VERIFICATION ----------

      - name: Add droplet to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      # ---------- DEPLOY ----------

      - name: Deploy en Droplet
        run: |
          ssh -i ~/.ssh/id_ed25519 \
          -o UserKnownHostsFile=~/.ssh/known_hosts \
          -o StrictHostKeyChecking=yes \
          deploy@${{ secrets.DROPLET_IP }} << 'EOF'

          echo "🚀 DEPLOY CONSTELACIÓN VIVA"

          DIR="/opt/apps/constelacion-viva-prod"
          BRANCH="main"
          COMPOSE="docker-compose.prod.yml"

          cd "$DIR"

          git fetch origin
          git reset --hard origin/$BRANCH

          docker compose -f "$COMPOSE" up -d --build --remove-orphans

          docker compose -f "$COMPOSE" ps

          docker exec cv_backend curl -s http://localhost:8000/api/health || true

          echo "✅ DEPLOY OK"

          EOF